<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Estoque TI</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --surface2: #1c2030;
      --border: #2a2f45;
      --accent: #00d4aa;
      --accent2: #3b82f6;
      --danger: #ef4444;
      --warn: #f59e0b;
      --ok: #22c55e;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(0,212,170,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.04) 0%, transparent 60%);
    }

    /* ── LOGIN ── */
    #login-screen {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.5s ease both;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg { width: 20px; height: 20px; stroke: #0d0f14; fill: none; stroke-width: 2.5; }

    .brand-name {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .login-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 7px;
    }

    .form-group input, .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.08);
    }

    .form-group input::placeholder { color: var(--text-muted); }
    .form-group select option { background: var(--surface2); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 7px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover { background: #00c49a; box-shadow: 0 0 20px rgba(0,212,170,0.25); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.2);
      padding: 5px 12px;
      font-size: 11px;
    }

    .btn-danger:hover { background: rgba(239,68,68,0.2); }

    /* ── APP ── */
    #app {
      display: none;
      width: 100%;
      max-width: 960px;
      animation: fadeUp 0.4s ease both;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .app-brand { display: flex; align-items: center; gap: 12px; }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
    }

    .role-tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(0,212,170,0.12);
      color: var(--accent);
      border: 1px solid rgba(0,212,170,0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
    }

    .card-full { grid-column: 1 / -1; }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── CONTADOR DE PERIFÉRICOS ── */
    #perifericos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .periferico-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .periferico-card:hover {
      transform: translateY(-2px);
    }

    .periferico-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 8px 8px 0 0;
    }

    .periferico-card.status-red   { border-color: rgba(239,68,68,0.35); }
    .periferico-card.status-red::before   { background: var(--danger); }

    .periferico-card.status-yellow { border-color: rgba(245,158,11,0.35); }
    .periferico-card.status-yellow::before { background: var(--warn); }

    .periferico-card.status-green  { border-color: rgba(34,197,94,0.35); }
    .periferico-card.status-green::before  { background: var(--ok); }

    .periferico-name {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .periferico-count {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      line-height: 1;
    }

    .periferico-card.status-red   .periferico-count { color: var(--danger); }
    .periferico-card.status-yellow .periferico-count { color: var(--warn); }
    .periferico-card.status-green  .periferico-count { color: var(--ok); }

    .periferico-label {
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.red    { background: var(--danger); box-shadow: 0 0 6px rgba(239,68,68,0.6); }
    .status-dot.yellow { background: var(--warn);   box-shadow: 0 0 6px rgba(245,158,11,0.6); }
    .status-dot.green  { background: var(--ok);     box-shadow: 0 0 6px rgba(34,197,94,0.6); }

    /* Legend */
    .counter-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .legend-dot.red    { background: var(--danger); }
    .legend-dot.yellow { background: var(--warn); }
    .legend-dot.green  { background: var(--ok); }

    .empty-counter {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
    }

    /* Lista de itens */
    #list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 11px 14px;
      font-size: 14px;
      transition: border-color 0.15s;
    }

    #list li:hover { border-color: rgba(0,212,170,0.3); }

    .item-info { display: flex; align-items: center; gap: 12px; }

    .item-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .item-name { font-weight: 600; font-size: 14px; }

    .item-cat {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .item-qty {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(0,212,170,0.08);
      border: 1px solid rgba(0,212,170,0.2);
      padding: 2px 10px;
      border-radius: 4px;
      margin-left: 6px;
    }

    .item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-state svg {
      width: 32px; height: 32px;
      margin-bottom: 10px;
      opacity: 0.3;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0 16px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes countUp {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .periferico-count { animation: countUp 0.35s ease both; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <div>
        <div class="brand-name">StockTI</div>
        <div class="brand-sub">Controle de Estoque</div>
      </div>
    </div>

    <div class="login-title">Bem-vindo</div>
    <div class="login-sub">Faça login para continuar</div>

    <div class="form-group">
      <label>Usuário</label>
      <input id="user" type="text" placeholder="seu.usuario">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input id="pass" type="password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary" onclick="login()">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Entrar
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="app-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#0d0f14;fill:none;stroke-width:2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <div>
        <div class="brand-name">StockTI</div>
        <div class="brand-sub">Controle de Estoque</div>
      </div>
    </div>
    <div class="user-badge">
      <svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:var(--text-dim);fill:none;stroke-width:2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span id="username-display" style="font-size:13px;color:var(--text-dim)"></span>
      <span id="role-display" class="role-tag"></span>
    </div>
  </div>

  <div class="grid">

    <!-- Adicionar item -->
    <div class="card">
      <div class="card-title">Adicionar Item</div>
      <div class="form-group">
        <label>Nome do Item</label>
        <input id="itemName" placeholder="Ex: Monitor 24''">
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <input id="category" placeholder="Ex: Monitor">
      </div>
      <button class="btn btn-secondary" onclick="addItem()" style="width:100%;justify-content:center;margin-top:4px;">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar Item
      </button>
    </div>

    <!-- Criar usuário -->
    <div class="card" id="create-user-card">
      <div class="card-title">Criar Usuário</div>
      <div class="form-group">
        <label>Usuário</label>
        <input id="newUser" placeholder="novo.usuario">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input id="newPass" type="password" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Perfil</label>
        <select id="role">
          <option value="admin">Admin</option>
          <option value="operador">Operador</option>
          <option value="visualizador">Visualizador</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="createUser()" style="width:100%;justify-content:center;margin-top:4px;">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Criar Usuário
      </button>
    </div>

    <!-- Contador de Periféricos por Categoria -->
    <div class="card card-full">
      <div class="card-title">Contador por Categoria</div>
      <div class="counter-legend">
        <div class="legend-item"><div class="legend-dot red"></div> Crítico (≤ 5)</div>
        <div class="legend-item"><div class="legend-dot yellow"></div> Atenção (6–9)</div>
        <div class="legend-item"><div class="legend-dot green"></div> Normal (≥ 10)</div>
      </div>
      <div id="perifericos-grid">
        <div class="empty-counter">Carregando contadores...</div>
      </div>
    </div>

    <!-- Lista de itens -->
    <div class="card card-full">
      <div class="card-title">Itens em Estoque</div>
      <ul id="list">
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <div>Carregando itens...</div>
        </div>
      </ul>
    </div>

  </div>
</div>

<script>
const API = "https://controle-de-estoque-fpmk.onrender.com";
let currentUser = null;

async function login(){
  const username = document.getElementById('user').value;
  const password = document.getElementById('pass').value;
  const res = await fetch(API + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  if(!res.ok){ alert('Erro no login'); return; }
  currentUser = await res.json();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('username-display').textContent = currentUser.username || username;
  document.getElementById('role-display').textContent = currentUser.role;
  if(currentUser.role !== 'admin'){
    document.getElementById('create-user-card').style.display = 'none';
  }
  loadItems();
  loadPerifericos();
}

/* ── CONTADOR ── */
function getStatus(qtd){
  if(qtd <= 5)  return 'red';
  if(qtd <= 9)  return 'yellow';
  return 'green';
}

function getLabelText(qtd){
  if(qtd <= 5)  return 'Crítico';
  if(qtd <= 9)  return 'Atenção';
  return 'Normal';
}

async function loadPerifericos(){
  const grid = document.getElementById('perifericos-grid');
  try {
    const res = await fetch(API + '/api/perifericos');
    const data = await res.json();
    const cats = Object.keys(data);

    if(cats.length === 0){
      grid.innerHTML = '<div class="empty-counter">Nenhuma categoria encontrada. Adicione itens para ver o contador.</div>';
      return;
    }

    grid.innerHTML = '';
    cats.sort().forEach(cat => {
      const qtd = data[cat];
      const status = getStatus(qtd);
      const label  = getLabelText(qtd);

      const card = document.createElement('div');
      card.className = `periferico-card status-${status}`;
      card.innerHTML = `
        <div class="periferico-name" title="${cat}">${cat}</div>
        <div class="periferico-count">${qtd}</div>
        <div class="periferico-label">
          <span class="status-dot ${status}"></span>
          ${label}
        </div>`;
      grid.appendChild(card);
    });
  } catch(e) {
    grid.innerHTML = '<div class="empty-counter">Erro ao carregar contadores.</div>';
  }
}

/* ── ITENS ── */
async function loadItems(){
  const res = await fetch(API + '/api/items');
  const items = await res.json();
  const list = document.getElementById('list');
  list.innerHTML = '';
  if(items.length === 0){
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      <div>Nenhum item encontrado</div>
    </div>`;
    return;
  }
  items.forEach(i => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div class="item-info">
        <span class="item-dot"></span>
        <span class="item-name">${i.name}</span>
        <span class="item-cat">${i.category}</span>
        <span class="item-qty">x${i.quantity ?? 1}</span>
      </div>
      <div class="item-actions"></div>`;
    if(currentUser.role !== 'visualizador'){
      const btn = document.createElement('button');
      btn.className = 'btn btn-danger';
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg> Remover`;
      btn.onclick = () => deleteItem(i.name);
      li.querySelector('.item-actions').appendChild(btn);
    }
    list.appendChild(li);
  });
}

async function addItem(){
  if(currentUser.role === 'visualizador'){ alert('Sem permissão'); return; }
  const name     = document.getElementById('itemName').value.trim();
  const category = document.getElementById('category').value.trim();
  if(!name || !category){ alert('Preencha o nome e a categoria.'); return; }
  await fetch(API + '/api/items', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, category })
  });
  document.getElementById('itemName').value = '';
  loadItems();
  loadPerifericos();
}

async function deleteItem(name){
  await fetch(API + '/api/items/' + encodeURIComponent(name), { method: 'DELETE' });
  loadItems();
  loadPerifericos();
}

async function createUser(){
  if(currentUser.role !== 'admin'){ alert('Apenas admin pode criar usuários'); return; }
  const username = document.getElementById('newUser').value;
  const password = document.getElementById('newPass').value;
  const role     = document.getElementById('role').value;
  await fetch(API + '/api/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, role })
  });
  alert('Usuário criado com sucesso');
}
</script>
</body>
</html>
